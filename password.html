<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALL IN — Access Required</title>
  <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Arial', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .gate {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .wordmark {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #fff;
      display: block;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .rule {
      width: 2rem;
      height: 2px;
      background: #fff;
      margin: 0 auto 2.5rem;
    }

    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.75rem;
    }

    input[type="password"] {
      width: 100%;
      background: #111;
      border: 1px solid #222;
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      padding: 0.875rem 1rem;
      border-radius: 2px;
      outline: none;
      text-align: center;
      letter-spacing: 0.1em;
      transition: border-color 0.15s;
      margin-bottom: 1rem;
    }

    input[type="password"]:focus {
      border-color: #555;
    }

    input[type="password"].error {
      border-color: #c0392b;
    }

    button {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      font-size: 0.75rem;
      font-family: inherit;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.875rem 1rem;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    button:hover { background: #e0e0e0; }
    button:active { background: #ccc; }

    .error-msg {
      font-size: 0.75rem;
      color: #c0392b;
      margin-top: 1rem;
      letter-spacing: 0.05em;
      min-height: 1rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .error-msg.visible { opacity: 1; }

    .footer-note {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="gate">
    <span class="wordmark">ALL IN</span>
    <p class="subtitle">The Most American Addiction</p>
    <div class="rule"></div>

    <form id="gate-form" autocomplete="off" novalidate>
      <label for="pw">Password Required</label>
      <input
        type="password"
        id="pw"
        name="pw"
        placeholder="••••••••••"
        autofocus
        autocomplete="off"
        spellcheck="false"
      >
      <button type="submit">Enter</button>
      <p class="error-msg" id="error-msg" role="alert" aria-live="polite">Incorrect password.</p>
    </form>
  </div>

  <p class="footer-note">Pedro Feria Pino / VEFILM &nbsp;&mdash;&nbsp; Confidential</p>

  <script>
    const form  = document.getElementById('gate-form');
    const input = document.getElementById('pw');
    const error = document.getElementById('error-msg');

    // If already authenticated, go straight in
    if (sessionStorage.getItem('allin_auth') === 'allin2026') {
      window.location.replace('/');
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      if (input.value === 'allin2026') {
        sessionStorage.setItem('allin_auth', 'allin2026');
        const dest = new URLSearchParams(window.location.search).get('from') || '/';
        window.location.replace(dest);
      } else {
        input.classList.add('error');
        error.classList.add('visible');
        input.value = '';
        input.focus();
        setTimeout(() => {
          input.classList.remove('error');
          error.classList.remove('visible');
        }, 2500);
      }
    });

    input.addEventListener('input', function() {
      input.classList.remove('error');
      error.classList.remove('visible');
    });
  </script>

</body>
</html>
